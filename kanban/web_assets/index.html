<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kanban board (read-only)</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script>
      window.KANBAN_CONFIG = { pollIntervalMs: __POLL_INTERVAL_MS__ };
    </script>
  </head>
  <body>
    <header class="topbar">
      <h1>Kanban <span class="subtitle">read-only</span></h1>
      <div class="meta" id="meta">
        <span id="board-dir">–</span>
        <span id="status-dot" class="dot idle" title="poll status"></span>
        <span id="updated-at">never</span>
      </div>
    </header>
    <main class="layout" aria-live="polite">
      <section id="col-inbox" class="column" data-status="inbox"></section>
      <section id="col-ready" class="column" data-status="ready"></section>
      <section id="col-doing" class="column" data-status="doing"></section>
      <section id="col-review" class="column" data-status="review"></section>
      <section id="col-done" class="column" data-status="done"></section>
      <aside class="panel runtime-cell">
        <h2>Runtime</h2>
        <div id="runtime"></div>
      </aside>
      <section id="col-blocked" class="column" data-status="blocked"></section>
      <aside class="panel events-cell">
        <h2>Recent events</h2>
        <ol class="events" id="events"></ol>
      </aside>
    </main>
    <script src="/static/dom.js"></script>
    <script src="/static/format.js"></script>
    <script src="/static/api.js"></script>
    <script src="/static/add_card_modal.js"></script>
    <script src="/static/board_view.js"></script>
    <script src="/static/artifact_browser.js"></script>
    <script src="/static/detail_sections.js"></script>
    <script src="/static/detail_modal.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
