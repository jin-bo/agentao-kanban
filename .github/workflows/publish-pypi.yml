name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    # Skip prerelease tags (v0.1.4-rc1, v1.0.0-beta.2, etc.) — those go to TestPyPI.
    # Prereleases per SemVer always contain a hyphen in the identifier.
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          py_ver=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$tag" != "$py_ver" ]; then
            echo "::error::Tag ${tag} does not match pyproject version ${py_ver}"
            exit 1
          fi

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest -q

      - name: Build sdist + wheel
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/agentao-kanban
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  smoke-install:
    name: Smoke-install from PyPI
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve package version
        id: ver
        run: |
          ref="${GITHUB_REF_NAME}"
          version="${ref#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Install from PyPI
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            if /tmp/smoke/bin/pip install \
                "agentao-kanban==${{ steps.ver.outputs.version }}"; then
              break
            fi
            echo "attempt ${attempt} failed, sleeping before retry (PyPI propagation)…"
            sleep 15
          done
          /tmp/smoke/bin/kanban --help
          /tmp/smoke/bin/kanban --board /tmp/smoke-board list
