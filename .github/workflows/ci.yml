name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        timeout-minutes: 10
        run: uv run pytest -vv --durations=20

      - name: Build sdist + wheel
        run: uv build

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/smoke-venv
          /tmp/smoke-venv/bin/pip install --upgrade pip
          /tmp/smoke-venv/bin/pip install dist/*.whl
          /tmp/smoke-venv/bin/kanban --help
          /tmp/smoke-venv/bin/kanban --board /tmp/smoke-board list

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
